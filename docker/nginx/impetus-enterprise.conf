# IMPETUS Enterprise — Nginx reverse proxy (Docker)
# CERT-ONPREM-CONTAINER-01
# Upstreams: serviços docker-compose (backend, frontend)

limit_req_zone $binary_remote_addr zone=impetus_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=impetus_static:10m rate=100r/s;

upstream impetus_frontend {
    server frontend:3000;
    keepalive 16;
}

upstream impetus_backend {
    server backend:4000;
    keepalive 16;
}

# HTTP — smoke / dev interno (TLS via mount em certificates/)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 55m;

    access_log /var/log/nginx/impetus-access.log;
    error_log /var/log/nginx/impetus-error.log warn;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Enterprise: bloquear rotas SaaS admin (ADR-003)
    location ^~ /api/impetus-admin {
        return 403;
    }
    location ^~ /api/admin-portal {
        return 403;
    }

    location /api/ {
        limit_req zone=impetus_api burst=60 nodelay;
        proxy_pass http://impetus_backend;
        include /etc/nginx/conf.d/impetus-proxy.conf;
    }

    location /uploads/ {
        limit_req zone=impetus_api burst=40 nodelay;
        proxy_pass http://impetus_backend;
        include /etc/nginx/conf.d/impetus-proxy.conf;
    }

    location = /health {
        proxy_pass http://impetus_backend;
        include /etc/nginx/conf.d/impetus-proxy.conf;
    }

    location /socket.io/ {
        proxy_pass http://impetus_backend;
        include /etc/nginx/conf.d/impetus-proxy-ws.conf;
    }

    location /impetus-realtime/ {
        proxy_pass http://impetus_backend;
        include /etc/nginx/conf.d/impetus-proxy-ws.conf;
    }

    location / {
        limit_req zone=impetus_static burst=200 nodelay;
        proxy_pass http://impetus_frontend;
        include /etc/nginx/conf.d/impetus-proxy.conf;
    }
}

