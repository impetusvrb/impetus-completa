<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, initial-scale=1" />
  <title>MOBILE-ANAM-004A — DISABLED State Fixture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #070c14;
      --cyan: #00d4ff;
      --font-mono: 'Share Tech Mono', monospace;
      --font-ui: 'Rajdhani', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-primary);
      color: #c8d4e0;
      font-family: var(--font-ui);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .frame {
      width: 360px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      padding: 16px 12px 20px;
      background: rgba(8, 14, 22, 0.96);
    }
    .brand {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--cyan);
      text-align: center;
      margin-bottom: 12px;
    }
    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
    .voice-avatar-external-slot {
      width: 220px;
      height: 220px;
      border-radius: 50%;
    }
    .voice-avatar-external-slot__mount {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(120, 140, 160, 0.32);
      background: radial-gradient(circle at 50% 42%, rgba(80, 100, 120, 0.12) 0%, rgba(7, 12, 20, 0.94) 58%, rgba(5, 10, 18, 0.98) 100%);
    }
    .voice-avatar-external-slot__placeholder {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      text-align: center;
      padding: 0 1rem;
    }
    .voice-avatar-external-slot__placeholder-title {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: rgba(160, 180, 200, 0.85);
      text-transform: uppercase;
    }
    .voice-avatar-external-slot__placeholder-sub {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(120, 140, 160, 0.78);
      line-height: 1.35;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-height: 40px;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(120, 140, 160, 0.28);
      background: rgba(8, 14, 22, 0.88);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: rgba(160, 180, 200, 0.82);
      margin: 0 auto;
    }
    .status-wrap { display: flex; justify-content: center; margin-top: 8px; }
    .meta {
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: rgba(120, 140, 160, 0.7);
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="frame" id="capture">
    <div class="brand">IMPETUS · ANAM_STATE.DISABLED</div>
    <div class="avatar-wrap">
      <div class="voice-avatar-external-slot">
        <div class="voice-avatar-external-slot__mount">
          <div class="voice-avatar-external-slot__placeholder">
            <span class="voice-avatar-external-slot__placeholder-title">ANAM</span>
            <span class="voice-avatar-external-slot__placeholder-sub">Módulo não habilitado</span>
          </div>
        </div>
      </div>
    </div>
    <div class="status-wrap">
      <span class="status-pill"><span aria-hidden="true">○</span> Inativa</span>
    </div>
    <div class="meta">
      anamEnabled=false · anamConfigured=false · anamStatus=unconfigured<br />
      resolveAnamOperationalState → disabled · showError=false
    </div>
  </div>
</body>
</html>
