<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prévia — lip sync SVG (Impetus)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #050a12;
      color: #9cc;
      font-family: system-ui, sans-serif;
    }
    p { margin: 0; font-size: 0.9rem; opacity: 0.85; }
    .face {
      position: relative;
      width: min(320px, 90vw);
      height: min(320px, 90vw);
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(30, 144, 255, 0.55);
      background: radial-gradient(ellipse at 50% 35%, #1a2840 0%, #050a12 65%);
    }
    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <p>Simulação da boca (mesmo SVG + lerp 0.3). Abra em dev: <code>/impetus-lipsync-preview.html</code></p>
  <div class="face" aria-hidden="true">
    <svg viewBox="0 0 400 400">
      <defs>
        <filter id="impLipGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="impLipBlur" />
          <feMerge>
            <feMergeNode in="impLipBlur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <g
        id="mouth"
        transform="translate(0 -64) translate(200 291) scale(0.82) translate(-200 -291)"
        filter="url(#impLipGlow)"
        fill="none"
        stroke="#00d4ff"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <g id="lipUpper">
          <path d="M 172 288 Q 186 284 200 286 Q 214 284 228 288" />
        </g>
        <ellipse id="mouthInterior" cx="200" cy="291" rx="25" ry="1" />
        <g id="lipLower">
          <path d="M 172 294 Q 200 300 228 294" />
        </g>
      </g>
    </svg>
  </div>
  <script>
    const lipUpper = document.getElementById('lipUpper');
    const lipLower = document.getElementById('lipLower');
    const mouthInterior = document.getElementById('mouthInterior');
    let lipVal = 0;
    let t0 = performance.now();

    function tick(now) {
      const t = (now - t0) / 1000;
      // “Fala” simulada: picos + silêncio (alvo 0–1)
      const syllable = Math.sin(t * 6.5) * 0.5 + 0.5;
      const burst = Math.pow(syllable, 3) * 0.95;
      const envelope = 0.35 + 0.65 * Math.sin(t * 1.1) * Math.sin(t * 1.1);
      const target = Math.min(1, burst * envelope);

      lipVal += (target - lipVal) * 0.3;
      if (lipVal < 1e-4) lipVal = 0;

      const ry = 1 + lipVal * 13;
      const dy = lipVal * 10;
      lipUpper.setAttribute('transform', 'translate(0 ' + -dy + ')');
      lipLower.setAttribute('transform', 'translate(0 ' + dy + ')');
      mouthInterior.setAttribute('ry', String(ry));

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
