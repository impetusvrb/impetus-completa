name: CERT Matrix Drift

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/src/**'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/src/**'

jobs:
  cert-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        run: npm ci --omit=dev 2>/dev/null || npm install --omit=dev

      - name: Matrix drift check (structure)
        working-directory: backend
        run: node scripts/audit/buildFunctionalMatrix.js --json

      - name: Fail on committed matrix drift
        working-directory: backend
        run: npm run cert:drift
