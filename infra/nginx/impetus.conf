# IMPETUS — reverse proxy (Nginx)
# Substituir: SEU_DOMINIO (ex.: app.exemplo.pt)
#
# Instalação:
#   sudo cp infra/nginx/impetus.conf /etc/nginx/sites-available/impetus
#   sudo sed -i 's/SEU_DOMINIO/app.exemplo.pt/g' /etc/nginx/sites-available/impetus
#   sudo ln -sf /etc/nginx/sites-available/impetus /etc/nginx/sites-enabled/impetus
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Certbot, após DNS apontar para Cloudflare → VPS):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d SEU_DOMINIO -d www.SEU_DOMINIO
#
# Com Cloudflare "Full (strict)": use certificado de origem CF ou Let's Encrypt no VPS.

# Rate limit básico (ajuste conforme carga)
limit_req_zone $binary_remote_addr zone=impetus_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=impetus_static:10m rate=100r/s;

upstream impetus_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream impetus_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Redirecionar HTTP → HTTPS (descomente após certificado válido)
server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO www.SEU_DOMINIO;

    # Certbot challenge (mantém durante renovação)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SEU_DOMINIO www.SEU_DOMINIO;

    # Certbot preenche estes paths; ou use Origin Certificate da Cloudflare
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # TLS moderno (fallback se options-ssl-nginx.conf não existir ainda)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 55m;

    # Headers de segurança (complementam Helmet no Node)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # Bloquear acesso directo ao IP público (só responde pelo domínio)
    if ($host !~* ^(SEU_DOMINIO|www\.SEU_DOMINIO)$) {
        return 444;
    }

    # --- API e assets dinâmicos → backend (NUNCA expor :4000 publicamente) ---
    location /api/ {
        limit_req zone=impetus_api burst=60 nodelay;
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location /uploads/ {
        limit_req zone=impetus_api burst=40 nodelay;
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location /health {
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    # WebSockets (Socket.IO + realtime)
    location /socket.io/ {
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy-ws.conf;
    }

    location /impetus-realtime/ {
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy-ws.conf;
    }

    # --- SPA estática (serveDist.cjs na porta 3000) ---
    location / {
        limit_req zone=impetus_static burst=200 nodelay;
        proxy_pass http://impetus_frontend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }
}
