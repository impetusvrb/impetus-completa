# IMPETUS — Nginx produção (srv1422313.hstgr.cloud)
# HARDENING-01: restaurado + proteção anti-scanner
# Deploy: scripts/deploy-nginx-hardening.sh

limit_req_zone $binary_remote_addr zone=impetus_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=impetus_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=impetus_static:10m rate=100r/s;
# Bloco 2 — anti-scan massivo (10 req/s por IP, burst 20)
limit_req_zone $binary_remote_addr zone=impetus_perip:10m rate=10r/s;

upstream impetus_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream impetus_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# Bloquear acesso directo por IP (sem Host válido)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;
    ssl_certificate     /etc/letsencrypt/live/srv1422313.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1422313.hstgr.cloud/privkey.pem;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name srv1422313.hstgr.cloud;

    include /etc/nginx/cloudflare-real-ip.conf;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name srv1422313.hstgr.cloud;

    ssl_certificate     /etc/letsencrypt/live/srv1422313.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1422313.hstgr.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/cloudflare-real-ip.conf;

    client_max_body_size 55m;
    server_tokens off;

    # Bloco 2 — log detalhado (forense TLS/scan)
    access_log /var/log/nginx/impetus-access.log impetus_detailed;

    # Rate limit global por IP (anti-scan)
    limit_req zone=impetus_perip burst=20 nodelay;

    # Headers de segurança (HTTP hardening)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # HARDENING-01: paths de scanner → 404 explícito (nunca SPA)
    include /etc/nginx/snippets/impetus-hardening-locations.conf;

    location /api/auth/ {
        limit_req zone=impetus_auth burst=5 nodelay;
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location /api/ {
        limit_req zone=impetus_api burst=30 nodelay;
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location /uploads/ {
        limit_req zone=impetus_api burst=30 nodelay;
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location /health {
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location /socket.io/ {
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy-ws.conf;
    }

    location /impetus-realtime/ {
        proxy_pass http://impetus_backend;
        include /etc/nginx/snippets/impetus-proxy-ws.conf;
    }

    # Assets estáticos com hash — permitidos
    location ^~ /assets/ {
        limit_req zone=impetus_static burst=200 nodelay;
        proxy_pass http://impetus_frontend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location ^~ /unity/ {
        limit_req zone=impetus_static burst=100 nodelay;
        proxy_pass http://impetus_frontend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }

    location / {
        limit_req zone=impetus_static burst=200 nodelay;
        proxy_pass http://impetus_frontend;
        include /etc/nginx/snippets/impetus-proxy.conf;
    }
}
