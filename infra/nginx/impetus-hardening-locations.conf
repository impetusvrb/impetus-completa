# HARDENING-02 — Pós-incidente Silvy X Ran (jul/2026)
# Paths sensíveis → 403 imediato (nginx), nunca fallback SPA
# Incluir dentro do server {} ANTES de location / { ... }

# Dotfiles (qualquer path)
location ~ /\. {
    deny all;
    return 403;
}

# Credenciais cloud / CLI / infra (wordlist Silvy + comum)
location ~* /(\.env|\.env\.[^/]+|\.git|\.aws|\.gcp|\.docker|docker-compose[^/]*\.ya?ml|\.hcloud\.toml|\.linode-cli|\.vultr-cli\.yaml|wp-config\.php[^/]*|\.envrc|\.flaskenv) {
    deny all;
    return 403;
}

location ~* ^/\.git {
    deny all;
    return 403;
}

# Variantes em subpaths (backend/.env, etc.)
location ~* ^/(?:backend|frontend|api|app|src|config|server|client|web|public|private|var)/\.env(?:$|[/?#]) {
    deny all;
    return 403;
}

# Ficheiros de build / infra
location ~* ^/(?:Dockerfile|docker-compose[^/]*|package\.json|package-lock\.json|yarn\.lock|pnpm-lock\.yaml|server\.js|webpack\.config\.[^/]+|vite\.config\.[^/]+|tsconfig\.json|jsconfig\.json|ecosystem\.config\.js)(?:$|[/?#]) {
    deny all;
    return 403;
}

# Extensões típicas de exfiltração (fora de /assets/ com hash)
location ~* ^/(?!assets/)[^/]*\.(?:env|yml|yaml|ini|config|php|asp|aspx|jsp|py|go|rs|sql|bak|swp|tmp|old|save|dist|sample|template|properties|toml|key|pem|crt|pfx|p12|map|log|dump|tar|gz|zip|7z|sqlite|db)(?:$|[/?#]) {
    deny all;
    return 403;
}

# Wordlists scanners (JSON/JS genéricos na raiz)
location ~* ^/(?:env|env\.js|env\.json|config\.js|config\.json|settings\.js|settings\.json|secrets\.json|credentials\.json|cdp_api_key\.json|appsettings(?:\.[^/]+)?\.json|application(?:\.[^/]+)?(?:\.properties|\.ya?ml)?|actuator/)(?:$|[/?#]) {
    deny all;
    return 403;
}

# Source maps
location ~* \.map$ {
    deny all;
    return 403;
}
