# Bloco 2 — Formato de log detalhado (forense pós-incidente Silvy)
# Incluir no contexto http {} de nginx.conf ou via include no topo do site.

log_format impetus_detailed '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'rt=$request_time '
                            'ua_enc="$http_accept_encoding" '
                            'xff="$http_x_forwarded_for" '
                            'proto=$server_protocol '
                            'tls_ver="$ssl_protocol" tls_cipher="$ssl_cipher" '
                            'conn=$connection conn_req=$connection_requests';
