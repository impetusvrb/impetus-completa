# IMPETUS — SSH hardening (HARDENING-01)
# Aplicar: sudo install -m 0644 infra/ssh/99-impetus-hardening.conf /etc/ssh/sshd_config.d/
#          sudo sshd -t && sudo systemctl reload sshd
#
# NOTA: PasswordAuthentication permanece yes até authorized_keys ser configurado.
#       Não desactivar password sem chaves válidas — risco de lockout.

MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2

# HARDENING-01: manter yes até authorized_keys configurado; migrar para prohibit-password depois.
PermitRootLogin yes
PubkeyAuthentication yes
PasswordAuthentication yes
PermitEmptyPasswords no
KbdInteractiveAuthentication no

AllowUsers root ubuntu

X11Forwarding no
AllowTcpForwarding yes
PermitTunnel no
MaxSessions 4
MaxStartups 4:50:8

PrintMotd no
Banner /etc/ssh/impetus-banner.txt
