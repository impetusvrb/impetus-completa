# IMPETUS Enterprise — Docker Compose oficial
# CERT-ONPREM-CONTAINER-01
#
# Runtime oficial: PM2 (pm2-runtime) — mesma stack certificada em INFRA-01
# Configuração: exclusivamente ${IMPETUS_HOME}/config/.env (+ .env compose para POSTGRES_*)
#
# Uso:
#   cp docker/config/env.enterprise.example ${IMPETUS_HOME}/config/.env
#   cp docker/config/compose.env.example .env
#   docker compose up -d --build

name: impetus-enterprise

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${IMPETUS_HOME:-./.impetus-home}/config/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-impetus_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD em .env ou config/.env}
      POSTGRES_DB: ${POSTGRES_DB:-impetus_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${IMPETUS_HOME:-./.impetus-home}/database/pgdata:/var/lib/postgresql/data
    networks:
      - impetus-data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-impetus_app} -d $${POSTGRES_DB:-impetus_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: impetus/backend-enterprise:${IMPETUS_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${IMPETUS_HOME:-./.impetus-home}/config/.env
    environment:
      IMPETUS_HOME: /opt/impetus
      PM2_HOME: /opt/impetus/runtime/pm2-backend
    volumes:
      - ${IMPETUS_HOME:-./.impetus-home}:/opt/impetus
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - impetus-data
      - impetus-internal
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256M,mode=1777
    cap_drop:
      - ALL
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:4000/health | grep -q \'"status"\' || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: impetus/frontend-enterprise:${IMPETUS_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${IMPETUS_HOME:-./.impetus-home}/config/.env
    environment:
      IMPETUS_HOME: /opt/impetus
      PM2_HOME: /opt/impetus/runtime/pm2-frontend
    volumes:
      - ${IMPETUS_HOME:-./.impetus-home}/logs/frontend:/opt/impetus/logs/frontend
      - ${IMPETUS_HOME:-./.impetus-home}/runtime:/opt/impetus/runtime
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - impetus-internal
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M,mode=1777
    cap_drop:
      - ALL

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${IMPETUS_HTTP_PORT:-80}:80"
      - "${IMPETUS_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/impetus-enterprise.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/impetus-proxy.conf:/etc/nginx/conf.d/impetus-proxy.conf:ro
      - ./docker/nginx/impetus-proxy-ws.conf:/etc/nginx/conf.d/impetus-proxy-ws.conf:ro
      - ${IMPETUS_HOME:-./.impetus-home}/certificates:/etc/impetus/certificates:ro
      - ${IMPETUS_HOME:-./.impetus-home}/logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - impetus-front
      - impetus-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID

networks:
  impetus-front:
    driver: bridge
  impetus-internal:
    driver: bridge
  impetus-data:
    driver: bridge
    internal: true
